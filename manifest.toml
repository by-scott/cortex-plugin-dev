name = "dev"
version = "1.6.0"
description = "Development tools for file editing, project mapping, code intelligence, version control, diagnostics, infrastructure, and workflow skills"
author = "cortex"
cortex_version = "1.6.0"
trust = "trusted_native"

[capabilities]
provides = ["tools", "skills"]
file_read = ["**"]
file_write = ["**"]
network = ["*"]
process = true
secrets = false
background = true

[sandbox]
level = "trusted_in_process"
network = "inherit"
filesystem = "declared_paths"
writable_paths = ["**"]
seccomp = ""
uid_drop = false

[package]
publisher_id = "by-scott"
manifest_sha256 = ""
binary_sha256 = ""
sbom = "sbom.spdx.json"
risk_profile = "risk.toml"
signature_algorithm = ""
public_key = ""
signature = ""

[package.conformance]
suite = "cortex-plugin-local-1.6.0"
passed = true
checked_at = "2026-04-28T12:52:49+08:00"

