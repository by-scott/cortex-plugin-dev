name = "governance"
passed = true
message = ""

[[package.conformance.checks]]
name = "manifest identity"
passed = true
message = ""

[[package.conformance.checks]]
name = "manifest version"
passed = true
message = ""

[[package.conformance.checks]]
name = "cortex compatibility"
passed = true
message = ""

[[package.conformance.checks]]
name = "capability declaration"
passed = true
message = ""

[[package.conformance.checks]]
name = "native isolation boundary"
passed = true
message = ""

